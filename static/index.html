<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCR 板位配液规划工具</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 PCR 板位配液规划工具</h1>
            <div class="status-bar">
                <span id="stats-info">加载中...</span>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="import">数据导入</button>
            <button class="tab-btn" data-tab="tasks">任务管理</button>
            <button class="tab-btn" data-tab="template">板位模板</button>
            <button class="tab-btn" data-tab="history">历史记录</button>
        </nav>

        <main>
            <section id="tab-import" class="tab-content active">
                <div class="import-section">
                    <h2>数据导入</h2>
                    
                    <div class="import-grid">
                        <div class="import-card">
                            <h3>📦 样本</h3>
                            <div class="import-actions">
                                <input type="file" id="sample-file" accept=".csv" style="display:none">
                                <button onclick="document.getElementById('sample-file').click()">导入 CSV</button>
                                <button onclick="loadSamples()">刷新列表</button>
                            </div>
                            <div id="sample-list" class="item-list">
                                <p class="empty">暂无样本</p>
                            </div>
                        </div>

                        <div class="import-card">
                            <h3>🧪 引物</h3>
                            <div class="import-actions">
                                <input type="file" id="primer-file" accept=".csv" style="display:none">
                                <button onclick="document.getElementById('primer-file').click()">导入 CSV</button>
                                <button onclick="loadPrimers()">刷新列表</button>
                            </div>
                            <div id="primer-list" class="item-list">
                                <p class="empty">暂无引物</p>
                            </div>
                        </div>

                        <div class="import-card">
                            <h3>💧 试剂</h3>
                            <div class="import-actions">
                                <input type="file" id="reagent-file" accept=".csv" style="display:none">
                                <button onclick="document.getElementById('reagent-file').click()">导入 CSV</button>
                                <button onclick="loadReagents()">刷新列表</button>
                            </div>
                            <div id="reagent-list" class="item-list">
                                <p class="empty">暂无试剂</p>
                            </div>
                        </div>

                        <div class="import-card">
                            <h3>📋 板位模板</h3>
                            <div class="import-actions">
                                <input type="file" id="template-file" accept=".csv" style="display:none">
                                <button onclick="document.getElementById('template-file').click()">导入 CSV</button>
                                <button onclick="loadTemplates()">刷新列表</button>
                            </div>
                            <div id="template-list" class="item-list">
                                <p class="empty">暂无模板</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="quick-setup">
                    <h2>🚀 快速开始</h2>
                    <p>点击下方按钮，一键导入所有样例数据并创建测试任务</p>
                    <button class="btn-primary" onclick="quickSetup()">一键导入样例数据</button>
                </div>
            </section>

            <section id="tab-tasks" class="tab-content">
                <div class="task-section">
                    <div class="task-header">
                        <h2>任务管理</h2>
                        <div class="task-filters">
                            <select id="task-status-filter" onchange="loadTasks()">
                                <option value="">全部状态</option>
                                <option value="draft">草稿</option>
                                <option value="pending_review">待复核</option>
                                <option value="approved">已批准</option>
                                <option value="rejected">已驳回</option>
                                <option value="revoked">已撤销</option>
                            </select>
                            <input type="file" id="task-import-file" accept=".json" style="display:none" onchange="importTaskFile(event)">
                            <button onclick="document.getElementById('task-import-file').click()">📥 导入方案</button>
                            <button class="btn-primary" onclick="showCreateTaskModal()">+ 新建任务</button>
                        </div>
                    </div>

                    <div id="task-list" class="task-list">
                        <p class="empty">暂无任务</p>
                    </div>
                </div>

                <div id="task-detail" class="task-detail hidden">
                    <div class="detail-header">
                        <h3>任务详情</h3>
                        <button onclick="closeTaskDetail()">关闭</button>
                    </div>
                    <div id="task-detail-content"></div>
                </div>
            </section>

            <section id="tab-template" class="tab-content">
                <div class="template-section">
                    <h2>板位可视化</h2>
                    <div class="template-selector">
                        <label>选择模板:</label>
                        <select id="plate-template-select" onchange="renderPlateView()">
                            <option value="">请选择模板</option>
                        </select>
                    </div>
                    <div id="plate-view" class="plate-view">
                        <p class="empty">请选择模板查看板位布局</p>
                    </div>
                </div>
            </section>

            <section id="tab-history" class="tab-content">
                <div class="history-section">
                    <h2>操作历史</h2>

                    <div class="history-filter-bar">
                        <div class="filter-row">
                            <div class="filter-field">
                                <label>任务</label>
                                <select id="history-filter-task">
                                    <option value="">全部任务</option>
                                </select>
                            </div>
                            <div class="filter-field">
                                <label>操作类型</label>
                                <select id="history-filter-action">
                                    <option value="">全部类型</option>
                                </select>
                            </div>
                            <div class="filter-field">
                                <label>起始日期</label>
                                <input type="date" id="history-filter-start">
                            </div>
                            <div class="filter-field">
                                <label>结束日期</label>
                                <input type="date" id="history-filter-end">
                            </div>
                        </div>
                        <div class="filter-row">
                            <div class="filter-field filter-keyword">
                                <label>关键词搜索</label>
                                <input type="text" id="history-filter-keyword" placeholder="搜索 action/detail/operator...">
                            </div>
                            <div class="filter-field filter-limit">
                                <label>返回条数</label>
                                <select id="history-filter-limit">
                                    <option value="20">20</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                    <option value="200">200</option>
                                    <option value="500">500</option>
                                    <option value="1000">1000</option>
                                </select>
                            </div>
                            <div class="filter-actions">
                                <button class="btn-primary" onclick="applyHistoryFilters()">🔍 应用筛选</button>
                                <button onclick="resetHistoryFilters()">↺ 重置</button>
                                <button onclick="showSavePresetModal()">💾 保存方案</button>
                            </div>
                        </div>
                        <div class="filter-row preset-row">
                            <div class="filter-field" style="flex: 1; min-width: 200px;">
                                <label>筛选方案</label>
                                <select id="history-filter-preset" onchange="applyPreset()">
                                    <option value="">-- 选择已保存的方案 --</option>
                                </select>
                            </div>
                            <div class="filter-actions" style="gap: 6px;">
                                <button onclick="setCurrentPresetAsDefault()" title="设为默认方案">⭐ 设默认</button>
                                <button onclick="deleteCurrentPreset()" title="删除当前方案">🗑️ 删除</button>
                                <button onclick="loadFilterPresets()" title="刷新方案列表">🔄 刷新</button>
                            </div>
                        </div>
                    </div>

                    <div id="history-filter-summary" class="history-filter-summary hidden"></div>
                    <div id="history-warnings" class="history-warnings hidden"></div>
                    <div id="history-errors" class="history-errors hidden"></div>

                    <div class="history-actions">
                        <div class="history-count">
                            <span id="history-count-info">共 0 条匹配，显示 0 条</span>
                        </div>
                        <div class="history-action-buttons">
                            <button onclick="loadHistory()">🔄 刷新</button>
                            <button onclick="exportHistoryJson()">📄 导出 JSON</button>
                            <button onclick="exportHistoryCsv()">📊 导出 CSV</button>
                        </div>
                    </div>

                    <div id="history-list" class="history-list">
                        <p class="empty">暂无历史记录</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
